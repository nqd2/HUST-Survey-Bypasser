<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; }
    h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #b71c1c; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .label-text { font-size: 13px; color: #333; }
    
    /* Switch styles */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; -webkit-transition: .4s; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; -webkit-transition: .4s; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #b71c1c; }
    input:focus + .slider { box-shadow: 0 0 1px #b71c1c; }
    input:checked + .slider:before { -webkit-transform: translateX(14px); -ms-transform: translateX(14px); transform: translateX(14px); }
  </style>
</head>
<body>
  <h3>HUST Auto Survey</h3>
  
  <div class="container">
    <span class="label-text">Tự động điền (Auto Fill)</span>
    <label class="switch">
      <input type="checkbox" id="autoFillToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="container">
    <span class="label-text">Hiện thông báo (Alert)</span>
    <label class="switch">
      <input type="checkbox" id="alertToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
