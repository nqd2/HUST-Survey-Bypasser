name: Release source ZIP

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release, ví dụ: v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      REPO_NAME: ${{ github.event.repository.name }}
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create source ZIP with manifest.json at ZIP root
        run: |
          set -e

          ZIP_NAME="${REPO_NAME}-${TAG_NAME}.zip"
          RELEASE_DIR="release-root"

          rm -rf "$RELEASE_DIR" "$ZIP_NAME"
          mkdir -p "$RELEASE_DIR"

          rsync -a \
            --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude="$ZIP_NAME" \
            ./ "$RELEASE_DIR/"

          if [ ! -f "$RELEASE_DIR/manifest.json" ]; then
            echo "ERROR: manifest.json not found at repository root."
            echo "The ZIP must contain manifest.json at archive root."
            exit 1
          fi

          cd "$RELEASE_DIR"
          zip -r "../$ZIP_NAME" .
          cd ..

          echo "Created $ZIP_NAME"
          unzip -l "$ZIP_NAME" | head -50

      - name: Create GitHub Release and upload ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          ZIP_NAME="${REPO_NAME}-${TAG_NAME}.zip"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ZIP_NAME" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_NAME" \
              --title "$TAG_NAME" \
              --notes "Automated source ZIP release. manifest.json is at ZIP root."
          fi
