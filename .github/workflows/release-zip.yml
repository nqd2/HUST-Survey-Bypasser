name: Create release ZIP
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create zip with a single top-level folder (so manifest.json is inside that folder)
        run: |
          set -e
          ZIP_NAME="${REPO_NAME}-${TAG_NAME}.zip"
          PACKAGE_DIR="package"
          TOP_DIR="${REPO_NAME}"
          rm -rf "$PACKAGE_DIR" "$ZIP_NAME"
          mkdir -p "$PACKAGE_DIR/$TOP_DIR"
          # Copy repository files into the top-level folder, excluding git data and workflows
          rsync -a --delete --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude="$ZIP_NAME" ./ "$PACKAGE_DIR/$TOP_DIR/"
          # Verify manifest exists (fail early if missing)
          if [ ! -f "$PACKAGE_DIR/$TOP_DIR/manifest.json" ]; then
            echo "ERROR: manifest.json not found at repository root. Place manifest.json at repo root so it will be inside the top-level folder in the zip."
            exit 1
          fi
          # Create zip containing the single top-level folder
          (cd "$PACKAGE_DIR" && zip -r "../$ZIP_NAME" "$TOP_DIR")
          ls -lh "$ZIP_NAME"

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          release_name: ${{ env.TAG_NAME }}
          body: "Automated release: zip with top-level folder containing manifest.json"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload zip to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.REPO_NAME }}-${{ env.TAG_NAME }}.zip
          asset_name: ${{ env.REPO_NAME }}-${{ env.TAG_NAME }}.zip
          asset_content_type: application/zipname: Create release ZIP with top-level folder

